<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gスクイール</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #20242a;
      --muted: #657083;
      --line: #d9dee7;
      --accent: #1267d8;
      --accent-soft: #eaf2ff;
      --danger: #c83232;
      --warn: #a66a00;
      --ok: #18794e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding-bottom: 82px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      padding: 12px 14px 10px;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .user {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      min-height: 18px;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 12px;
    }
    .home-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .home-panel {
      display: grid;
      gap: 12px;
    }
    .home-hero {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }
    .home-hero .title {
      font-size: 17px;
      line-height: 1.35;
      margin-bottom: 2px;
    }
    .home-hero-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .eyebrow {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }
    .subtle {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }
    .home-next-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .home-brief {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .home-brief span,
    .summary-pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      background: #eef1f5;
      color: #495267;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 750;
    }
    .home-brief .danger,
    .summary-pill.danger {
      background: #fff3d8;
      color: var(--warn);
    }
    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-top: 2px;
    }
    .section-title h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.3;
    }
    .section-title span {
      color: var(--muted);
      font-size: 12px;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab,
    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 42px;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
    }
    .tab.active {
      border-color: var(--accent);
      background: #eaf2ff;
      color: #0c4a9e;
    }
    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .secondary {
      color: var(--muted);
      background: #fff;
    }
    .danger {
      border-color: #f2c0c0;
      color: var(--danger);
      background: #fff7f7;
    }
    button:disabled,
    input:disabled,
    select:disabled,
    textarea:disabled {
      opacity: 0.58;
      cursor: wait;
    }
    body.is-busy button,
    body.is-busy input,
    body.is-busy select,
    body.is-busy textarea {
      pointer-events: none;
    }
    .stack {
      display: grid;
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .card:target,
    .card.focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(18, 103, 216, 0.12);
    }
    .title {
      font-size: 15px;
      font-weight: 750;
      margin: 0 0 4px;
      word-break: break-word;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 9px;
      background: #eef1f5;
      color: #495267;
      font-size: 12px;
      font-weight: 650;
    }
    .badge.overdue { background: #ffecec; color: var(--danger); }
    .badge.near { background: #fff3d8; color: var(--warn); }
    .badge.done { background: #e7f6ee; color: var(--ok); }
    .badge.pending { background: #eef1f5; color: #495267; }
    .row {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }
    .row b {
      color: #394150;
      font-weight: 650;
    }
    .task-compact {
      padding: 10px 11px;
    }
    .task-compact .title {
      font-size: 14px;
      margin-bottom: 6px;
    }
    .task-compact .meta {
      margin-bottom: 6px;
    }
    .task-compact .actions {
      margin-top: 8px;
    }
    .task-extra {
      margin-top: 8px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .task-extra summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .form {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
    }
    label {
      color: #394150;
      font-size: 12px;
      font-weight: 650;
    }
    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      min-height: 42px;
      padding: 9px 10px;
      font: inherit;
      font-size: 14px;
    }
    textarea {
      min-height: 72px;
      resize: vertical;
    }
    .preview {
      border-color: #f1c36d;
      background: #fffaf0;
      color: #714700;
    }
    @media (max-width: 560px) {
      .field-grid {
        grid-template-columns: 1fr;
      }
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .calendar-toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .calendar-toolbar button {
      min-height: 38px;
      padding: 7px 8px;
      font-size: 13px;
    }
    .calendar-toolbar button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #0c4a9e;
    }
    .calendar-panel {
      display: grid;
      gap: 10px;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
    }
    .calendar-day {
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 6px 4px;
      color: var(--text);
      text-align: center;
    }
    .calendar-day.outside {
      background: #f1f3f6;
      color: #98a1b1;
    }
    .calendar-day.today {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(18, 103, 216, 0.14) inset;
    }
    .calendar-day b {
      display: block;
      font-size: 13px;
      line-height: 1.2;
    }
    .calendar-day span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      margin-top: 4px;
      border-radius: 999px;
      background: #eef1f5;
      color: #495267;
      font-size: 11px;
      font-weight: 750;
    }
    .calendar-day .overdue { background: #ffecec; color: var(--danger); }
    .calendar-day .near { background: #fff3d8; color: var(--warn); }
    .calendar-day .done { background: #e7f6ee; color: var(--ok); }
    .agenda-group {
      display: grid;
      gap: 8px;
    }
    .agenda-date {
      color: #394150;
      font-size: 12px;
      font-weight: 750;
      margin: 2px 0 -2px;
    }
    .admin-menu {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0;
    }
    .admin-menu > summary {
      list-style: none;
      cursor: pointer;
      padding: 13px 14px;
      color: var(--text);
      font-weight: 750;
    }
    .admin-menu > summary::-webkit-details-marker {
      display: none;
    }
    .admin-menu > summary::after {
      content: "開く";
      float: right;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .admin-menu[open] > summary::after {
      content: "閉じる";
    }
    .admin-menu small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }
    .admin-menu-body {
      display: grid;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding: 10px;
      background: #f7f8fa;
    }
    .advanced-fields {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0;
    }
    .advanced-fields > summary {
      cursor: pointer;
      padding: 10px 12px;
      color: #394150;
      font-size: 13px;
      font-weight: 700;
    }
    .advanced-fields .field-grid {
      padding: 0 10px 10px;
    }
    .advanced-fields > .card {
      margin: 0 10px 10px;
    }
    .bottom-menu {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      border-top: 1px solid var(--line);
      background: var(--line);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .menu-btn {
      min-height: 62px;
      border: 0;
      border-radius: 0;
      background: #fff;
      color: #384253;
      padding: 6px 2px;
      font-size: 12px;
      font-weight: 750;
    }
    .menu-btn b {
      display: block;
      font-size: 18px;
      line-height: 1.1;
      margin-bottom: 2px;
    }
    .menu-btn.active {
      background: #eaf2ff;
      color: #0c4a9e;
    }
    .empty,
    .notice,
    .error {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 18px 14px;
      color: var(--muted);
      text-align: center;
    }
    .notice {
      border-color: #b9d3f7;
      color: #1f4f85;
      background: #f4f8ff;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .error {
      border-color: #f0b8b8;
      color: var(--danger);
      background: #fff8f8;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .loading {
      color: var(--muted);
      text-align: center;
      padding: 20px 0;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(247, 248, 250, 0.68);
      backdrop-filter: blur(2px);
    }
    .loading-sheet {
      width: min(300px, calc(100vw - 48px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 44px rgba(36, 44, 56, 0.18);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #d6dde8;
      border-top-color: var(--accent);
      border-radius: 50%;
      flex: none;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; }
    }
    .debug {
      margin-top: 12px;
      border: 1px dashed #b8c0cc;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      color: #394150;
      font-size: 12px;
      word-break: break-word;
    }
    .debug summary {
      cursor: pointer;
      font-weight: 700;
    }
    .debug pre {
      margin: 8px 0 0;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
    }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <header>
    <h1>マイページ</h1>
    <div id="user" class="user"></div>
    <div id="homeSummary" class="home-summary" hidden></div>
  </header>
  <main>
    <div id="message"></div>
    <section id="todayView" class="stack"></section>
    <section id="casesView" class="stack" hidden></section>
    <section id="calendarView" class="stack" hidden></section>
    <section id="settingsView" class="stack" hidden></section>
    <section id="detailView" class="stack" hidden></section>
    <details id="debugPanel" class="debug" hidden>
      <summary>LIFFデバッグ</summary>
      <pre id="debugLog"></pre>
    </details>
  </main>
  <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite" hidden>
    <div class="loading-sheet">
      <span class="spinner" aria-hidden="true"></span>
      <span id="loadingText">読み込み中です。</span>
    </div>
  </div>
  <nav class="bottom-menu" aria-label="Gスクイールメニュー">
    <button class="menu-btn active" type="button" data-view="today"><b>今</b>今日</button>
    <button class="menu-btn" type="button" data-view="cases"><b>件</b>案件</button>
    <button class="menu-btn" type="button" data-view="calendar"><b>予</b>予定表</button>
    <button class="menu-btn" type="button" data-view="settings"><b>設</b>設定</button>
  </nav>

  <script>
    const LIFF_ID = "2010221787-EQOsOECT";
    const API_URL = "https://script.google.com/macros/s/AKfycbxp4msQecWB1hSO-iApaAF7dUTDkWeHftfhLQP1rKryT5VzlJv_HyUKTIgReKarq91ZsQ/exec";
    let idToken = '';
    let currentUser = null;
    let todayTasks = [];
    let cases = [];
    let calendarItems = [];
    let adminOptions = null;
    let previewUserId = '';
    let previewInfo = null;
    let activeCaseId = '';
    let lastIdentity = null;
    let interactionLocked = false;
    let homeSummary = null;
    let loadedViews = {};
    let calendarMode = 'week';

    const el = (id) => document.getElementById(id);
    const qs = new URLSearchParams(location.search);
    previewUserId = qs.get('previewUserId') || '';
    const DEBUG_MODE = qs.get('debug') === '1';
    const clientDebugEvents = [];
    const READ_API_ACTIONS = {
      whoami: true,
      me: true,
      dashboard: true,
      todayTasks: true,
      listCases: true,
      calendar: true,
      getCase: true,
      adminOptions: true,
    };
    const VIEW_TITLES = {
      today: '今日やること',
      cases: '担当案件',
      calendar: '予定表',
      settings: '設定',
    };
    const DATE_FIELD_OPTIONS = [
      { value: 'coverageDate', label: '取材日' },
      { value: 'shootDate', label: '撮影日' },
      { value: 'releaseDate', label: '配信日' },
      { value: 'recordingDate', label: '収録日' },
      { value: 'visitDate', label: '来店日' },
      { value: 'appearanceDate', label: '出演日' },
      { value: 'csReleaseDate', label: 'CS配信日' },
    ];
    const DEFAULT_VIEW = VIEW_TITLES[qs.get('view')] ? qs.get('view') : 'today';
    if (['week', 'month', 'list'].indexOf(qs.get('calendarMode')) >= 0) {
      calendarMode = qs.get('calendarMode');
    }
    let currentView = DEFAULT_VIEW;

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function badgeClass(status) {
      if (status === '期限超過') return 'overdue';
      if (status === '期限接近') return 'near';
      if (status === '完了') return 'done';
      return 'pending';
    }

    function parseLiffDate(value) {
      const raw = String(value || '').trim();
      const m = raw.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
      if (!m) return null;
      const date = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function dateKey(date) {
      if (!date) return '';
      return [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, '0'),
        String(date.getDate()).padStart(2, '0'),
      ].join('-');
    }

    function addDays(date, days) {
      const out = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      out.setDate(out.getDate() + days);
      return out;
    }

    function startOfWeek(date) {
      const base = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const offset = (base.getDay() + 6) % 7;
      base.setDate(base.getDate() - offset);
      return base;
    }

    function formatShortDate(date) {
      if (!date) return '期日未設定';
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]})`;
    }

    function statusRank(status) {
      if (status === '期限超過') return 4;
      if (status === '期限接近') return 3;
      if (status === '予定') return 2;
      if (status === '完了') return 1;
      return 0;
    }

    function strongestStatus(tasks) {
      return (tasks || []).reduce((best, task) =>
        statusRank(task.status) > statusRank(best) ? task.status : best, '');
    }

    function showMessage(text, type) {
      const kind = type === true ? 'error' : (type || 'empty');
      el('message').innerHTML = text
        ? `<div class="${kind}">${escapeHtml(text)}</div>`
        : '';
      if (kind === 'error') renderDebugPanel(true);
    }

    function userFacingError(err) {
      const message = (err && err.message) || String(err || '');
      if (
        message.indexOf('タイムアウト') >= 0 ||
        message.indexOf('Failed to fetch') >= 0 ||
        message.indexOf('NetworkError') >= 0 ||
        message.indexOf('Load failed') >= 0 ||
        message.indexOf('429') >= 0 ||
        message.indexOf('500') >= 0 ||
        message.indexOf('502') >= 0 ||
        message.indexOf('503') >= 0 ||
        message.indexOf('504') >= 0 ||
        message.indexOf('LIFF APIの応答を読み取れません') >= 0
      ) {
        return [
          '読み込みに時間がかかっています。',
          '少し待ってから、LINEアプリで開き直してください。',
          '何度も出る場合は、管理者にこの画面の内容を共有してください。',
        ].join('\n');
      }
      return message || '処理中にエラーが発生しました。時間をおいて開き直してください。';
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function isRetryableApiError(err) {
      const message = (err && err.message) || String(err || '');
      return message.indexOf('タイムアウト') >= 0 ||
        message.indexOf('Failed to fetch') >= 0 ||
        message.indexOf('NetworkError') >= 0 ||
        message.indexOf('Load failed') >= 0 ||
        message.indexOf('LIFF API通信に失敗しました') >= 0 ||
        message.indexOf('LIFF APIの応答を読み取れません') >= 0;
    }

    function shouldFallbackToIdentity(err) {
      const message = (err && err.message) || String(err || '');
      return message.indexOf('登録されていません') >= 0 || message.indexOf('無効') >= 0;
    }

    function debugBase() {
      return {
        href: location.href,
        path: location.pathname,
        search: location.search,
        userAgent: navigator.userAgent,
        hasGoogleScriptRun: typeof google !== 'undefined' && !!(google.script && google.script.run),
        hasLiff: typeof liff !== 'undefined',
        liffIdSet: !!LIFF_ID,
        apiUrlSet: !!API_URL,
        screen: `${window.innerWidth}x${window.innerHeight}`,
      };
    }

    function renderDebugPanel(force) {
      const panel = el('debugPanel');
      const log = el('debugLog');
      if (!panel || !log) return;
      if (!DEBUG_MODE && !force) return;
      panel.hidden = false;
      log.textContent = clientDebugEvents
        .slice(-30)
        .map((item) => {
          const parts = [
            item.at,
            item.level || 'INFO',
            item.stage,
            item.action ? `action=${item.action}` : '',
            item.message || item.error || '',
            item.transport ? `transport=${item.transport}` : '',
            item.requested === true || item.requested === false ? `requested=${item.requested}` : '',
            item.settingsRow ? `settingsRow=${item.settingsRow}` : '',
            item.registered === true || item.registered === false ? `registered=${item.registered}` : '',
            item.active === true || item.active === false ? `active=${item.active}` : '',
          ].filter(Boolean);
          return parts.join(' | ');
        })
        .join('\n');
    }

    function debugLog(stage, details = {}) {
      const event = {
        ...debugBase(),
        ...details,
        at: new Date().toISOString(),
        stage,
        level: details.level || 'INFO',
      };
      delete event.idToken;
      delete event.token;
      clientDebugEvents.push(event);
      renderDebugPanel(false);
      if (!DEBUG_MODE) return;
      try {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withFailureHandler(() => {})
            .callLiffApi({ action: 'debugLog', event });
          return;
        }
        if (API_URL) {
          fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'debugLog', event }),
          }).catch(() => {});
        }
      } catch (err) {
        // デバッグログ送信自体の失敗で本処理を止めない。
      }
    }

    function buttonActionName(button) {
      if (!button) return '';
      if (button.dataset.case) return 'getCase';
      if (button.dataset.complete) return 'completeTask';
      if (button.dataset.reopen) return 'reopenTask';
      if (button.dataset.requestRegistration) return 'requestRegistration';
      if (button.dataset.applyPreview) return 'applyPreview';
      if (button.dataset.clearPreview) return 'clearPreview';
      if (button.dataset.setupTestSamples) return 'setupTestSamples';
      if (button.dataset.cleanupTestSamples) return 'cleanupTestSamples';
      if (button.dataset.createCase) return 'createCase';
      return '';
    }

    function buttonBusyLabel(button) {
      if (!button) return '';
      if (button.dataset.case) return '読み込み中';
      if (button.dataset.complete || button.dataset.reopen) return '更新中';
      if (button.dataset.requestRegistration) return '申請中';
      if (button.dataset.applyPreview || button.dataset.clearPreview) return '切替中';
      if (button.dataset.setupTestSamples) return '作成中';
      if (button.dataset.cleanupTestSamples) return '削除中';
      if (button.dataset.createCase) return '作成中';
      return '通信中';
    }

    function setControlsLocked(locked, sourceButton) {
      document.body.classList.toggle('is-busy', locked);
      document.querySelectorAll('button, input, select, textarea').forEach((control) => {
        if (locked) {
          if (!control.dataset.liffWasLocked) {
            control.dataset.liffWasLocked = '1';
            control.dataset.liffWasDisabled = control.disabled ? '1' : '0';
          }
          control.disabled = true;
          return;
        }
        if (control.dataset.liffWasLocked === '1') {
          control.disabled = control.dataset.liffWasDisabled === '1';
          delete control.dataset.liffWasLocked;
          delete control.dataset.liffWasDisabled;
        }
      });
      if (sourceButton) {
        sourceButton.setAttribute('aria-busy', locked ? 'true' : 'false');
        if (locked) {
          if (!sourceButton.dataset.liffOriginalText) {
            sourceButton.dataset.liffOriginalText = sourceButton.textContent;
          }
          sourceButton.textContent = buttonBusyLabel(sourceButton);
        } else if (sourceButton.dataset.liffOriginalText) {
          sourceButton.textContent = sourceButton.dataset.liffOriginalText;
          delete sourceButton.dataset.liffOriginalText;
        }
      }
    }

    function showLoadingOverlay(text) {
      const overlay = el('loadingOverlay');
      const label = el('loadingText');
      if (!overlay || !label) return;
      label.textContent = text || '読み込み中です。';
      overlay.hidden = false;
      document.body.setAttribute('aria-busy', 'true');
    }

    function hideLoadingOverlay() {
      const overlay = el('loadingOverlay');
      if (overlay) overlay.hidden = true;
      document.body.removeAttribute('aria-busy');
    }

    function beginExclusiveAction(button) {
      const action = buttonActionName(button);
      if (!action) return false;
      if (interactionLocked) {
        debugLog('interaction_ignored', {
          action,
          message: '別の処理が完了するまで操作を無視しました。',
        });
        return false;
      }
      interactionLocked = true;
      setControlsLocked(true, button);
      showLoadingOverlay(`${buttonBusyLabel(button)}です。`);
      return true;
    }

    function endExclusiveAction(button) {
      interactionLocked = false;
      setControlsLocked(false, button);
      hideLoadingOverlay();
    }

    function setLoading(text) {
      showLoadingOverlay(text || '読み込み中です。');
      el('todayView').hidden = false;
      el('casesView').hidden = true;
      el('calendarView').hidden = true;
      el('settingsView').hidden = true;
      el('detailView').hidden = true;
      el('todayView').innerHTML = `<div class="loading">${escapeHtml(text || '読み込み中です。')}</div>`;
    }

    function allViews() {
      return ['today', 'cases', 'calendar', 'settings'];
    }

    function setActiveMenu(view) {
      document.querySelectorAll('.menu-btn').forEach((button) => {
        button.classList.toggle('active', button.dataset.view === view);
      });
    }

    function showOnly(view) {
      currentView = view;
      allViews().forEach((name) => {
        const node = el(`${name}View`);
        if (node) node.hidden = name !== view;
      });
      el('detailView').hidden = true;
      activeCaseId = '';
      setActiveMenu(view);
      document.querySelector('h1').textContent = VIEW_TITLES[view] || 'マイページ';
      updateHomeSummary();
    }

    function updateHomeSummary() {
      const node = el('homeSummary');
      if (!currentUser || !node) {
        if (node) node.hidden = true;
        return;
      }
      const summary = homeSummary || {};
      const todayCount = summary.todayCount !== undefined ? summary.todayCount : todayTasks.length;
      const caseCount = summary.caseCount !== undefined ? summary.caseCount : cases.length;
      const alertCount = summary.alertCount !== undefined
        ? summary.alertCount
        : todayTasks.filter((task) => !task.completed && (task.status === '期限超過' || task.status === '期限接近')).length;
      node.hidden = currentView === 'today';
      node.innerHTML = `
        <span class="summary-pill">今日 ${escapeHtml(todayCount)}</span>
        <span class="summary-pill${alertCount ? ' danger' : ''}">注意 ${escapeHtml(alertCount)}</span>
        <span class="summary-pill">案件 ${escapeHtml(caseCount)}</span>
      `;
    }

    function withTimeout(promise, label, ms = 15000) {
      let timer = null;
      const timeout = new Promise((_, reject) => {
        timer = setTimeout(() => {
          reject(new Error(`${label}がタイムアウトしました。LINEアプリ内で開き直してください。`));
        }, ms);
      });
      return Promise.race([promise, timeout]).finally(() => {
        if (timer) clearTimeout(timer);
      });
    }

    function isAppsScriptSandboxHost() {
      return location.hostname.indexOf('script.googleusercontent.com') >= 0
        && location.pathname.indexOf('/userCodeAppPanel') >= 0;
    }

    function isAdminUser() {
      return currentUser && currentUser.role === '管理者';
    }

    function isPreviewActive() {
      return !!(previewInfo && previewInfo.enabled);
    }

    function updateUserLabel() {
      if (!currentUser) {
        el('user').textContent = '';
        return;
      }
      const base = `${currentUser.displayName || '利用者'} / ${currentUser.role || ''}`;
      el('user').textContent = previewInfo && previewInfo.enabled
        ? `${base} / プレビュー:${previewInfo.displayName || previewInfo.userId}`
        : base;
    }

    function setUser(user) {
      currentUser = user;
      updateUserLabel();
      updateHomeSummary();
    }

    function setLineProfile(profile, suffix) {
      const name = (profile && profile.displayName) || 'LINE利用者';
      el('user').textContent = `${name}${suffix ? ' / ' + suffix : ''}`;
    }

    function registrationMessage(identity) {
      if (identity && identity.registered && !identity.active) {
        return [
          '登録申請は送信済みです。',
          '管理者が確認すると、この画面で今日やることを見られるようになります。',
          'しばらくしてからLINEアプリで開き直してください。',
        ].filter(Boolean).join('\n');
      }
      return [
        'このLINEアカウントはまだ利用登録されていません。',
        '登録申請を自動で送信します。管理者の確認後に使えるようになります。',
      ].filter(Boolean).join('\n');
    }

    function showRegistration(identity, extraMessage) {
      lastIdentity = identity || null;
      hideLoadingOverlay();
      const text = [registrationMessage(identity), extraMessage || ''].filter(Boolean).join('\n\n');
      showMessage(text, 'notice');
      el('todayView').hidden = false;
      el('casesView').hidden = true;
      el('calendarView').hidden = true;
      el('settingsView').hidden = true;
      el('detailView').hidden = true;
      el('todayView').innerHTML = identity && identity.registered
        ? '<div class="empty">管理者の確認待ちです。確認が終わると、今日やることがここに表示されます。</div>'
        : `
          <div class="actions">
            <button class="primary" type="button" data-request-registration="1">利用登録を申請する</button>
          </div>
        `;
    }

    function callServerApi(payload) {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        debugLog('transport_selected', { transport: 'google.script.run', action: payload && payload.action });
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler((err) => {
              reject(new Error((err && err.message) || String(err || 'Apps Script APIエラー')));
            })
            .callLiffApi(payload);
        });
      }
      debugLog('transport_selected', { transport: 'fetch', action: payload && payload.action });
      return fetch(API_URL || location.href, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        cache: 'no-store',
        body: JSON.stringify(payload),
      }).then(async (response) => {
        const text = await response.text();
        if (!response.ok) {
          throw new Error(`LIFF API通信に失敗しました (${response.status})`);
        }
        try {
          return JSON.parse(text || '{}');
        } catch (err) {
          throw new Error('LIFF APIの応答を読み取れませんでした。Web Appの公開設定を確認してください。');
        }
      });
    }

    async function api(action, body = {}) {
      const attempts = READ_API_ACTIONS[action] ? 2 : 1;
      const timeoutMs = action === 'dashboard' ? 25000 : 15000;
      for (let attempt = 1; attempt <= attempts; attempt++) {
        debugLog('api_start', { action, hasIdToken: !!idToken, attempt });
        try {
          const result = await withTimeout(
            callServerApi({ ...body, action, idToken }),
            'LIFF API通信',
            timeoutMs
          );
          if (!result.ok) throw new Error(result.error || 'APIエラー');
          if (result.data && result.data.user) setUser(result.data.user);
          debugLog('api_success', {
            action,
            attempt,
            requested: result.data && result.data.requested,
            settingsRow: result.data && result.data.settingsRow,
            registered: result.data && result.data.registered,
            active: result.data && result.data.active,
            lineUserId: result.data && result.data.profile && result.data.profile.lineUserId,
            displayName: result.data && result.data.profile && result.data.profile.displayName,
          });
          return result.data;
        } catch (err) {
          debugLog('api_error', {
            level: 'ERROR',
            action,
            attempt,
            error: err.message || String(err),
          });
          if (attempt < attempts && isRetryableApiError(err)) {
            showLoadingOverlay('読み込みに時間がかかっています。もう一度だけ試しています。');
            await wait(700);
            continue;
          }
          throw err;
        }
      }
    }

    function taskActionButtons(task) {
      const detailButton = `<button class="secondary" type="button" data-case="${escapeHtml(task.caseId)}">案件を見る</button>`;
      const actionButton = isPreviewActive()
        ? ''
        : task.completed
        ? `<button class="danger" type="button" data-reopen="${escapeHtml(task.taskId)}">未完了に戻す</button>`
        : `<button class="primary" type="button" data-complete="${escapeHtml(task.taskId)}">完了にする</button>`;
      return `${actionButton}${detailButton}`;
    }

    function taskCard(task, options = {}) {
      const focus = options.focus ? ' focus' : '';
      const compact = options.compact ? ' task-compact' : '';
      const details = [
        task.locationName ? `<div class="row"><b>場所</b><span>${escapeHtml(task.locationName)}</span></div>` : '',
        task.targetName ? `<div class="row"><b>対象</b><span>${escapeHtml(task.targetName)}</span></div>` : '',
        task.vendorName ? `<div class="row"><b>手配先</b><span>${escapeHtml(task.vendorName)}</span></div>` : '',
        task.note ? `<div class="row"><b>メモ</b><span>${escapeHtml(task.note)}</span></div>` : '',
      ].filter(Boolean).join('');
      const meta = [
        `<span class="badge ${badgeClass(task.status)}">${escapeHtml(task.status)}</span>`,
        `<span>${escapeHtml(task.dueDate || '期日未設定')}</span>`,
        options.compact ? '' : `<span>${escapeHtml(task.assignee || '担当未設定')}</span>`,
      ].filter(Boolean).join('');
      const detailBlock = details && !options.compact
        ? `<details class="task-extra"><summary>詳細</summary>${details}</details>`
        : '';
      return `
        <article id="task-${escapeHtml(task.taskId)}" class="card${compact}${focus}">
          <p class="title">${escapeHtml(task.taskName)}</p>
          <div class="meta">${meta}</div>
          <p class="subtle">${escapeHtml(task.caseTitle)}</p>
          ${detailBlock}
          <div class="actions">${taskActionButtons(task)}</div>
        </article>
      `;
    }

    function optionList(values, selected) {
      return (values || []).map((value) => {
        const raw = typeof value === 'string' ? value : value.value;
        const label = typeof value === 'string' ? value : value.label;
        return `<option value="${escapeHtml(raw)}"${raw === selected ? ' selected' : ''}>${escapeHtml(label || raw)}</option>`;
      }).join('');
    }

    function previewNoticeHtml() {
      if (!isPreviewActive()) return '';
      return `<div class="notice preview">担当者プレビュー中: ${escapeHtml(previewInfo.displayName || previewInfo.userId)} として見える範囲だけ表示しています。更新操作はできません。</div>`;
    }

    function caseCard(item) {
      const badges = [
        item.overdueCount ? `<span class="badge overdue">期限超過 ${item.overdueCount}</span>` : '',
        item.approachingCount ? `<span class="badge near">期限接近 ${item.approachingCount}</span>` : '',
        `<span class="badge pending">未完了 ${item.incompleteCount}</span>`,
      ].join('');
      return `
        <article class="card">
          <p class="title">${escapeHtml(item.title)}</p>
          <div class="meta">
            <span>${escapeHtml(item.caseType)}</span>
            <span>${escapeHtml(item.assignee || '担当未設定')}</span>
          </div>
          <div class="meta">${badges}</div>
          <div class="actions">
            <button class="primary" type="button" data-case="${escapeHtml(item.caseId)}">作業を見る</button>
          </div>
        </article>
      `;
    }

    function getHomeSummaryValue(key, fallback) {
      return homeSummary && homeSummary[key] !== undefined ? homeSummary[key] : fallback;
    }

    function renderTodayHome() {
      const nextTask = todayTasks.find((task) => !task.completed) || todayTasks[0] || null;
      const overdueCount = todayTasks.filter((task) => !task.completed && task.status === '期限超過').length;
      const nearCount = todayTasks.filter((task) => !task.completed && task.status === '期限接近').length;
      const todayCount = getHomeSummaryValue('todayCount', todayTasks.length);
      const caseCount = getHomeSummaryValue('caseCount', cases.length);
      const alertCount = getHomeSummaryValue('alertCount', overdueCount + nearCount);
      const hero = nextTask ? `
        <article class="home-hero">
          <div class="home-hero-head">
            <div>
              <span class="eyebrow">次の作業</span>
              <p class="title">${escapeHtml(nextTask.taskName)}</p>
              <p class="subtle">${escapeHtml(nextTask.caseTitle || '')}</p>
            </div>
            <span class="badge ${badgeClass(nextTask.status)}">${escapeHtml(nextTask.status)}</span>
          </div>
          <div class="home-next-meta">
            <span>${escapeHtml(nextTask.dueDate || '期日未設定')}</span>
            ${nextTask.locationName ? `<span>${escapeHtml(nextTask.locationName)}</span>` : ''}
            ${nextTask.targetName ? `<span>${escapeHtml(nextTask.targetName)}</span>` : ''}
          </div>
          <div class="actions">${taskActionButtons(nextTask)}</div>
        </article>
      ` : `
        <article class="home-hero">
          <div>
            <span class="eyebrow">次の作業</span>
            <p class="title">今日すぐ対応が必要な作業はありません</p>
            <p class="subtle">担当中の案件は「担当案件」から確認できます。</p>
          </div>
        </article>
      `;
      return `
        <section class="home-panel">
          ${hero}
          <div class="home-brief" aria-label="担当状況の要約">
            <span>今日 ${escapeHtml(todayCount)}</span>
            <span class="${alertCount ? 'danger' : ''}">注意 ${escapeHtml(alertCount)}${overdueCount ? ` / 超過 ${escapeHtml(overdueCount)}` : ''}</span>
            <span>案件 ${escapeHtml(caseCount)}</span>
          </div>
        </section>
      `;
    }

    function renderToday() {
      showOnly('today');
      const todayList = todayTasks.length
        ? `
          <div class="section-title">
            <h2>今日の対応</h2>
            <span>${escapeHtml(todayTasks.length)}件</span>
          </div>
          ${todayTasks.map((task) => taskCard(task, { compact: true, focus: task.taskId === qs.get('taskId') })).join('')}
        `
        : '';
      el('todayView').innerHTML = previewNoticeHtml() + renderTodayHome() + todayList;
    }

    function renderCases() {
      showOnly('cases');
      el('casesView').innerHTML = previewNoticeHtml() + (cases.length
        ? cases.map(caseCard).join('')
        : '<div class="empty">表示できる担当案件はまだありません。案件が割り当てられると、ここに表示されます。</div>');
    }

    function calendarModeButton(mode, label) {
      const active = calendarMode === mode;
      return `<button type="button" data-calendar-mode="${mode}" class="${active ? 'active' : ''}" aria-pressed="${active ? 'true' : 'false'}">${label}</button>`;
    }

    function tasksForCalendarMode() {
      const today = new Date();
      const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      if (calendarMode === 'list') return calendarItems.slice();
      if (calendarMode === 'week') {
        const start = startOfWeek(base);
        const end = addDays(start, 6);
        return calendarItems.filter((task) => {
          const date = parseLiffDate(task.dueDate);
          return date && date >= start && date <= end;
        });
      }
      return calendarItems.filter((task) => {
        const date = parseLiffDate(task.dueDate);
        return date && date.getFullYear() === base.getFullYear() && date.getMonth() === base.getMonth();
      });
    }

    function calendarItemsByDate(items) {
      const grouped = {};
      (items || []).forEach((task) => {
        const key = dateKey(parseLiffDate(task.dueDate)) || 'none';
        grouped[key] = grouped[key] || [];
        grouped[key].push(task);
      });
      return grouped;
    }

    function renderCalendarDay(date, grouped, outside) {
      const key = dateKey(date);
      const items = grouped[key] || [];
      const status = strongestStatus(items);
      const todayKey = dateKey(new Date());
      return `
        <div class="calendar-day${outside ? ' outside' : ''}${key === todayKey ? ' today' : ''}">
          <b>${date.getDate()}</b>
          ${items.length ? `<span class="${badgeClass(status)}">${items.length}</span>` : '<span>0</span>'}
        </div>
      `;
    }

    function renderCalendarGrid(items) {
      const grouped = calendarItemsByDate(items);
      const today = new Date();
      const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      if (calendarMode === 'week') {
        const start = startOfWeek(base);
        return `
          <article class="card calendar-panel">
            <div class="section-title">
              <h2>今週</h2>
              <span>${formatShortDate(start)} - ${formatShortDate(addDays(start, 6))}</span>
            </div>
            <div class="calendar-grid">
              ${Array.from({ length: 7 }, (_, i) => renderCalendarDay(addDays(start, i), grouped, false)).join('')}
            </div>
          </article>
        `;
      }
      if (calendarMode === 'month') {
        const first = new Date(base.getFullYear(), base.getMonth(), 1);
        const start = startOfWeek(first);
        const days = Array.from({ length: 42 }, (_, i) => addDays(start, i));
        return `
          <article class="card calendar-panel">
            <div class="section-title">
              <h2>${base.getFullYear()}年${base.getMonth() + 1}月</h2>
              <span>${items.length}件</span>
            </div>
            <div class="calendar-grid">
              ${days.map((date) => renderCalendarDay(date, grouped, date.getMonth() !== base.getMonth())).join('')}
            </div>
          </article>
        `;
      }
      return '';
    }

    function renderAgendaList(items) {
      const grouped = calendarItemsByDate(items);
      const keys = Object.keys(grouped).sort();
      if (!keys.length) return '<div class="empty">この範囲の予定はありません。</div>';
      return keys.map((key) => {
        const date = key === 'none' ? null : parseLiffDate(key);
        return `
          <div class="agenda-group">
            <p class="agenda-date">${escapeHtml(formatShortDate(date))}</p>
            ${grouped[key].map((task) => taskCard(task, { compact: true, focus: task.taskId === qs.get('taskId') })).join('')}
          </div>
        `;
      }).join('');
    }

    function renderCalendar() {
      showOnly('calendar');
      const visibleItems = tasksForCalendarMode();
      el('calendarView').innerHTML = previewNoticeHtml() + `
        <div class="calendar-toolbar">
          ${calendarModeButton('week', '今週')}
          ${calendarModeButton('month', '今月')}
          ${calendarModeButton('list', '日付別')}
        </div>
        ${calendarItems.length ? renderCalendarGrid(visibleItems) : ''}
        ${calendarItems.length ? renderAgendaList(visibleItems) : '<div class="empty">表示できる予定はまだありません。担当案件や工程が割り当てられると、ここに表示されます。</div>'}
      `;
    }

    function adminUserOptions(selected) {
      const users = (adminOptions && adminOptions.users) || [];
      return optionList(users.map((user) => ({
        value: user.userId,
        label: `${user.displayName || user.userId} / ${user.role || ''}`,
      })), selected || (currentUser && currentUser.userId) || '');
    }

    function adminPreviewCard() {
      if (!isAdminUser() || !adminOptions) return '';
      return `
        <article class="card">
          <p class="title">担当者プレビュー</p>
          <div class="form">
            <div class="field">
              <label for="previewUserId">表示確認する利用者</label>
              <select id="previewUserId">${adminUserOptions(previewUserId || (currentUser && currentUser.userId) || '')}</select>
            </div>
            <div class="actions">
              <button class="primary" type="button" data-apply-preview="1">この利用者で表示</button>
              <button class="secondary" type="button" data-clear-preview="1">プレビュー解除</button>
            </div>
          </div>
        </article>
      `;
    }

    function adminSampleCard() {
      if (!isAdminUser() || !adminOptions || isPreviewActive()) return '';
      const selected = previewUserId || (currentUser && currentUser.userId) || '';
      return `
        <article class="card">
          <p class="title">TESTサンプル</p>
          <div class="form">
            <div class="field">
              <label for="sampleUserId">割り当て先</label>
              <select id="sampleUserId">${adminUserOptions(selected)}</select>
            </div>
            <div class="actions">
              <button class="primary" type="button" data-setup-test-samples="1">TESTを投入</button>
              <button class="danger" type="button" data-cleanup-test-samples="1">TESTを削除</button>
            </div>
          </div>
        </article>
      `;
    }

    function adminCaseForm() {
      if (!isAdminUser() || !adminOptions || isPreviewActive()) return '';
      const caseTypes = adminOptions.caseTypes || [];
      const channels = adminOptions.channels || [];
      const dateOptions = optionList(DATE_FIELD_OPTIONS, 'coverageDate');
      return `
        <article class="card">
          <p class="title">案件作成</p>
          <div class="form">
            <div class="field">
              <label for="caseTitle">案件名</label>
              <input id="caseTitle" type="text" autocomplete="off" placeholder="例: 月例番組 6月 第1回">
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="caseType">案件種別</label>
                <select id="caseType">${optionList(caseTypes, caseTypes[0] || '')}</select>
              </div>
              <div class="field">
                <label for="caseChannel">チャンネル</label>
                <select id="caseChannel"><option value="">未設定</option>${optionList(channels, '')}</select>
              </div>
            </div>
            <div class="field">
              <label for="caseProgram">番組</label>
              <select id="caseProgram"><option value="">未設定</option></select>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="casePrimaryDateType">主要日付の種類</label>
                <select id="casePrimaryDateType">${dateOptions}</select>
              </div>
              <div class="field">
                <label for="casePrimaryDate">主要日付</label>
                <input id="casePrimaryDate" type="date">
              </div>
            </div>
            <div class="field">
              <label for="caseNote">備考</label>
              <textarea id="caseNote"></textarea>
            </div>
            <details class="advanced-fields">
              <summary>詳細日付</summary>
              <div class="field-grid">
                <div class="field"><label for="shootDate">撮影日</label><input id="shootDate" type="date"></div>
                <div class="field"><label for="releaseDate">配信日</label><input id="releaseDate" type="date"></div>
                <div class="field"><label for="recordingDate">収録日</label><input id="recordingDate" type="date"></div>
                <div class="field"><label for="visitDate">来店日</label><input id="visitDate" type="date"></div>
                <div class="field"><label for="appearanceDate">出演日</label><input id="appearanceDate" type="date"></div>
                <div class="field"><label for="coverageDate">取材日</label><input id="coverageDate" type="date"></div>
                <div class="field"><label for="csReleaseDate">CS配信日</label><input id="csReleaseDate" type="date"></div>
              </div>
            </details>
            <div class="actions">
              <button class="primary" type="button" data-create-case="1">案件を作成</button>
            </div>
          </div>
        </article>
      `;
    }

    function refreshProgramSelect() {
      const select = el('caseProgram');
      const channel = el('caseChannel');
      if (!select || !channel || !adminOptions) return;
      const programsByChannel = adminOptions.programsByChannel || {};
      const programs = channel.value
        ? (programsByChannel[channel.value] || [])
        : Object.keys(programsByChannel).reduce((all, key) => all.concat(programsByChannel[key] || []), []);
      const unique = programs.filter((value, index, all) => all.indexOf(value) === index);
      select.innerHTML = `<option value="">未設定</option>${optionList(unique, select.value)}`;
    }

    function adminMenuHtml() {
      if (!isAdminUser() || !adminOptions) return '';
      const tools = [adminSampleCard(), adminPreviewCard()].filter(Boolean).join('');
      const toolsBlock = tools
        ? `<details class="advanced-fields"><summary>検証・表示確認</summary>${tools}</details>`
        : '';
      const items = [adminCaseForm(), toolsBlock].filter(Boolean).join('');
      if (!items) return '';
      return `
        <details class="admin-menu">
          <summary>管理者メニュー<small>必要な時だけ開く</small></summary>
          <div class="admin-menu-body">${items}</div>
        </details>
      `;
    }

    function renderSettings() {
      showOnly('settings');
      const user = currentUser || {};
      el('settingsView').innerHTML = `
        ${previewNoticeHtml()}
        <article class="card">
          <p class="title">${escapeHtml(user.displayName || '利用者')}</p>
          <div class="row"><b>権限</b><span>${escapeHtml(user.role || '')}</span></div>
          <div class="row"><b>区分</b><span>${escapeHtml(user.type || '')}</span></div>
          <div class="row"><b>利用者ID</b><span>${escapeHtml(user.userId || '')}</span></div>
        </article>
        <div class="notice">表示内容や担当案件が違う場合は、管理者に設定_利用者と担当割当の確認を依頼してください。</div>
        ${adminMenuHtml()}
      `;
      refreshProgramSelect();
    }

    function renderView(view) {
      if (view === 'cases') renderCases();
      else if (view === 'calendar') renderCalendar();
      else if (view === 'settings') renderSettings();
      else renderToday();
      hideLoadingOverlay();
    }

    async function renderDetail(caseId, taskId = '') {
      showMessage('');
      const data = await api('getCase', Object.assign({ caseId, taskId }, previewUserId ? { previewUserId } : {}));
      previewInfo = data.preview || null;
      updateUserLabel();
      el('todayView').hidden = true;
      el('casesView').hidden = true;
      el('calendarView').hidden = true;
      el('settingsView').hidden = true;
      el('detailView').hidden = false;
      setActiveMenu('');
      document.querySelector('h1').textContent = data.case.title;
      activeCaseId = data.case.caseId;
      el('detailView').innerHTML = previewNoticeHtml() + (data.tasks.length
        ? data.tasks.map((task) => taskCard(task, { focus: task.taskId === data.focusTaskId })).join('')
        : '<div class="empty">この案件の作業はありません。</div>');
      hideLoadingOverlay();
    }

    function applyDashboardData(data, view) {
      const payload = data || {};
      previewInfo = payload.preview || null;
      homeSummary = payload.homeSummary || homeSummary;
      if (Object.prototype.hasOwnProperty.call(payload, 'todayTasks')) todayTasks = payload.todayTasks || [];
      if (Object.prototype.hasOwnProperty.call(payload, 'cases')) cases = payload.cases || [];
      if (Object.prototype.hasOwnProperty.call(payload, 'calendarItems')) calendarItems = payload.calendarItems || [];
      if (Object.prototype.hasOwnProperty.call(payload, 'adminOptions')) adminOptions = payload.adminOptions || null;
      if (view) loadedViews[view] = true;
      updateUserLabel();
      updateHomeSummary();
    }

    async function reloadData(view = currentView) {
      const targetView = VIEW_TITLES[view] ? view : 'today';
      const scoped = previewUserId ? { previewUserId } : {};
      applyDashboardData(await api('dashboard', Object.assign({}, scoped, { view: targetView })), targetView);
    }

    async function openView(view) {
      const targetView = VIEW_TITLES[view] ? view : 'today';
      if (!loadedViews[targetView]) {
        setLoading(`${VIEW_TITLES[targetView] || '画面'}を読み込んでいます。`);
        await reloadData(targetView);
      }
      renderView(targetView);
    }

    function resetLoadedViews() {
      loadedViews = {};
    }

    async function completeTask(taskId, reopen) {
      if (isPreviewActive()) {
        showMessage('担当者プレビュー中は更新できません。プレビューを解除してから操作してください。', 'notice');
        return;
      }
      showMessage('');
      await api(reopen ? 'reopenTask' : 'completeTask', { taskId });
      resetLoadedViews();
      await reloadData(currentView);
      const visibleDetail = !el('detailView').hidden;
      if (visibleDetail) {
        if (activeCaseId) await renderDetail(activeCaseId, taskId);
      } else {
        renderView(currentView);
      }
    }

    async function requestRegistration() {
      setLoading('登録申請を作成しています。');
      const result = await api('requestRegistration');
      debugLog('registration_requested', {
        requested: result && result.requested,
        settingsRow: result && result.settingsRow,
        registered: result && result.registered,
        active: result && result.active,
        lineUserId: result && result.profile && result.profile.lineUserId,
      });
      if (result && result.registered && result.active) {
        if (result.user) setUser(result.user);
        setLoading('案件情報を読み込んでいます。');
        resetLoadedViews();
        await reloadData(DEFAULT_VIEW);
        renderView(DEFAULT_VIEW);
        return;
      }
      setLoading('登録申請を確認しています。');
      const identity = await api('whoami');
      if (identity && identity.profile) setLineProfile(identity.profile, identity.active ? '登録済み' : '確認待ち');
      showRegistration(identity, result && result.requested ? '申請を送信しました。管理者の確認をお待ちください。' : '');
    }

    async function applyPreviewMode() {
      const select = el('previewUserId');
      previewUserId = select ? select.value : '';
      setLoading('担当者表示を確認しています。');
      resetLoadedViews();
      await reloadData(currentView);
      renderView(currentView);
    }

    async function clearPreviewMode() {
      previewUserId = '';
      previewInfo = null;
      setLoading('表示を戻しています。');
      resetLoadedViews();
      await reloadData(currentView);
      renderView(currentView);
    }

    async function setupTestSamples() {
      if (isPreviewActive()) {
        showMessage('担当者プレビュー中はTESTサンプルを変更できません。プレビューを解除してから操作してください。', 'notice');
        return;
      }
      const select = el('sampleUserId');
      const targetUserId = select ? select.value : '';
      setLoading('TESTサンプルを投入しています。');
      const data = await api('setupTestSamples', { targetUserId });
      previewUserId = targetUserId;
      resetLoadedViews();
      await reloadData(currentView);
      renderSettings();
      const result = data.result || {};
      showMessage(`TESTサンプルを作成しました。\n案件ID: ${result.caseId || ''}\n割り当て先: ${result.targetDisplayName || result.targetUserId || ''}`, 'notice');
    }

    async function cleanupTestSamples() {
      if (isPreviewActive()) {
        showMessage('担当者プレビュー中はTESTサンプルを変更できません。プレビューを解除してから操作してください。', 'notice');
        return;
      }
      setLoading('TESTサンプルを削除しています。');
      const data = await api('cleanupTestSamples');
      previewUserId = '';
      previewInfo = null;
      resetLoadedViews();
      await reloadData(currentView);
      renderSettings();
      const result = data.result || {};
      showMessage(`TESTサンプルを削除しました。\n案件:${result.cases || 0} / 工程:${result.tasks || 0} / 案件担当:${result.caseAssignees || 0} / 工程担当:${result.taskAssignees || 0}`, 'notice');
    }

    async function createCaseFromLiff() {
      if (isPreviewActive()) {
        showMessage('担当者プレビュー中は案件を作成できません。プレビューを解除してから操作してください。', 'notice');
        return;
      }
      const dates = {
        shootDate: el('shootDate') ? el('shootDate').value : '',
        releaseDate: el('releaseDate') ? el('releaseDate').value : '',
        recordingDate: el('recordingDate') ? el('recordingDate').value : '',
        visitDate: el('visitDate') ? el('visitDate').value : '',
        appearanceDate: el('appearanceDate') ? el('appearanceDate').value : '',
        coverageDate: el('coverageDate') ? el('coverageDate').value : '',
        csReleaseDate: el('csReleaseDate') ? el('csReleaseDate').value : '',
      };
      const primaryDateType = el('casePrimaryDateType') ? el('casePrimaryDateType').value : 'coverageDate';
      const primaryDate = el('casePrimaryDate') ? el('casePrimaryDate').value : '';
      if (primaryDate && Object.prototype.hasOwnProperty.call(dates, primaryDateType) && !dates[primaryDateType]) {
        dates[primaryDateType] = primaryDate;
      }
      const payload = {
        title: el('caseTitle') ? el('caseTitle').value : '',
        caseType: el('caseType') ? el('caseType').value : '',
        channel: el('caseChannel') ? el('caseChannel').value : '',
        program: el('caseProgram') ? el('caseProgram').value : '',
        shootDate: dates.shootDate,
        releaseDate: dates.releaseDate,
        recordingDate: dates.recordingDate,
        visitDate: dates.visitDate,
        appearanceDate: dates.appearanceDate,
        coverageDate: dates.coverageDate,
        csReleaseDate: dates.csReleaseDate,
        note: el('caseNote') ? el('caseNote').value : '',
      };
      setLoading('案件を作成しています。');
      const data = await api('createCase', payload);
      previewUserId = '';
      previewInfo = null;
      resetLoadedViews();
      await reloadData(currentView);
      const result = data.result || {};
      const message = `案件を作成しました。\n案件ID: ${result.caseId || ''}`;
      if (result.caseId) await renderDetail(result.caseId);
      else renderCases();
      showMessage(message, 'notice');
    }

    document.addEventListener('click', async (event) => {
      const button = event.target.closest('button');
      if (!button) return;
      if (interactionLocked) {
        event.preventDefault();
        debugLog('interaction_ignored', {
          action: buttonActionName(button) || (button.dataset.view ? `view:${button.dataset.view}` : 'button'),
          message: '処理中のため連続操作を無視しました。',
        });
        return;
      }
      const needsExclusive = !!buttonActionName(button);
      const locked = needsExclusive ? beginExclusiveAction(button) : false;
      if (needsExclusive && !locked) {
        event.preventDefault();
        return;
      }
      try {
        if (button.dataset.calendarMode) {
          calendarMode = button.dataset.calendarMode;
          renderCalendar();
        }
        else if (button.dataset.view) await openView(button.dataset.view);
        else if (button.dataset.case) await renderDetail(button.dataset.case);
        else if (button.dataset.complete) await completeTask(button.dataset.complete, false);
        else if (button.dataset.reopen) await completeTask(button.dataset.reopen, true);
        else if (button.dataset.requestRegistration) await requestRegistration();
        else if (button.dataset.applyPreview) await applyPreviewMode();
        else if (button.dataset.clearPreview) await clearPreviewMode();
        else if (button.dataset.setupTestSamples) await setupTestSamples();
        else if (button.dataset.cleanupTestSamples) await cleanupTestSamples();
        else if (button.dataset.createCase) await createCaseFromLiff();
      } catch (err) {
        showMessage(userFacingError(err), true);
      } finally {
        if (locked) endExclusiveAction(button);
      }
    });

    document.addEventListener('change', (event) => {
      if (event.target && event.target.id === 'caseChannel') refreshProgramSelect();
    });

    async function start() {
      try {
        debugLog('start');
        setLoading('LIFF認証を確認しています。');
        if (!LIFF_ID) throw new Error('LIFF_ID が未設定です。Apps Script のスクリプトプロパティを確認してください。');
        if (isAppsScriptSandboxHost()) {
          debugLog('gas_htmlservice_sandbox_detected', {
            level: 'ERROR',
            message: 'LIFF UI is running inside Apps Script HtmlService sandbox.',
          });
          throw new Error([
            'この画面は Apps Script のサンドボックス内で開かれているため、LIFFを初期化できません。',
            'GAS Web AppはAPI専用にし、LIFF Endpoint URLにはHTTPSで公開した静的HTMLのURLを設定してください。',
          ].join('\n'));
        }
        if (typeof liff === 'undefined') {
          throw new Error('LIFF SDKを読み込めませんでした。LINEアプリ内で開き直してください。');
        }
        debugLog('liff_init_start');
        await withTimeout(liff.init({ liffId: LIFF_ID }), 'LIFF初期化');
        debugLog('liff_init_success', { isLoggedIn: liff.isLoggedIn() });
        if (!liff.isLoggedIn()) {
          debugLog('liff_login_redirect');
          liff.login({ redirectUri: location.href });
          return;
        }
        idToken = liff.getIDToken();
        debugLog('id_token_checked', { hasIdToken: !!idToken });
        if (!idToken) throw new Error('LIFFのIDトークンを取得できませんでした。');
        setLoading('案件情報を読み込んでいます。');
        try {
          await reloadData(DEFAULT_VIEW);
          debugLog('data_loaded', {
            active: true,
            source: 'dashboard',
          });
          const caseId = qs.get('caseId');
          const taskId = qs.get('taskId');
          if (caseId || taskId) await renderDetail(caseId || '', taskId || '');
          else renderView(DEFAULT_VIEW);
          return;
        } catch (dashboardErr) {
          if (!shouldFallbackToIdentity(dashboardErr)) throw dashboardErr;
          debugLog('dashboard_identity_fallback', {
            message: dashboardErr.message || String(dashboardErr),
          });
        }

        setLoading('LINE連携情報を確認しています。');
        const identity = await api('whoami');
        lastIdentity = identity || null;
        if (identity && identity.profile) setLineProfile(identity.profile, identity.registered ? (identity.active ? '登録済み' : '確認待ち') : '未登録');
        if (!identity.registered) {
          debugLog('identity_unregistered', {
            lineUserId: identity.profile && identity.profile.lineUserId,
            displayName: identity.profile && identity.profile.displayName,
          });
          try {
            await requestRegistration();
          } catch (registrationErr) {
            showRegistration(
              identity,
              `${userFacingError(registrationErr)}\n下のボタンからもう一度申請できます。`
            );
          }
          return;
        }
        if (!identity.active) {
          debugLog('identity_inactive', {
            lineUserId: identity.profile && identity.profile.lineUserId,
            displayName: identity.profile && identity.profile.displayName,
          });
          showRegistration(identity);
          return;
        }
        if (identity.user) setUser(identity.user);
        setLoading('案件情報を読み込んでいます。');
        await reloadData(DEFAULT_VIEW);
        debugLog('data_loaded', {
          lineUserId: identity.profile && identity.profile.lineUserId,
          active: identity.active,
        });
        const caseId = qs.get('caseId');
        const taskId = qs.get('taskId');
        if (caseId || taskId) await renderDetail(caseId || '', taskId || '');
        else renderView(DEFAULT_VIEW);
      } catch (err) {
        debugLog('start_error', {
          level: 'ERROR',
          error: err.message || String(err),
        });
        hideLoadingOverlay();
        showMessage(userFacingError(err), true);
        el('todayView').innerHTML = '';
      }
    }

    debugLog('script_loaded');
    start();
  </script>
</body>
</html>
